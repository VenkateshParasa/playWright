version: '3.8'

services:
  # Node.js sandbox
  nodejs-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.nodejs
    image: playground-nodejs-sandbox:latest
    container_name: nodejs-sandbox-template
    volumes:
      - sandbox-data:/workspace
    networks:
      - sandbox-network
    restart: "no"

  # Python sandbox
  python-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: playground-python-sandbox:latest
    container_name: python-sandbox-template
    volumes:
      - sandbox-data:/workspace
    networks:
      - sandbox-network
    restart: "no"

  # Playwright sandbox
  playwright-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    image: playground-playwright-sandbox:latest
    container_name: playwright-sandbox-template
    volumes:
      - sandbox-data:/workspace
    networks:
      - sandbox-network
    restart: "no"
    shm_size: 2gb

  # Full-stack sandbox
  fullstack-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.fullstack
    image: playground-fullstack-sandbox:latest
    container_name: fullstack-sandbox-template
    volumes:
      - sandbox-data:/workspace
    networks:
      - sandbox-network
    restart: "no"

  # PostgreSQL for database labs
  postgres:
    image: postgres:15-alpine
    container_name: sandbox-postgres
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: sandbox_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sandbox-network
    ports:
      - "5432:5432"

  # Redis for caching labs
  redis:
    image: redis:7-alpine
    container_name: sandbox-redis
    networks:
      - sandbox-network
    ports:
      - "6379:6379"

volumes:
  sandbox-data:
  postgres-data:

networks:
  sandbox-network:
    driver: bridge
