apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: playwright-learning
  labels:
    app: api-gateway
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: https
    port: 443
    targetPort: 3000
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: playwright-learning
  labels:
    app: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
  - name: http
    port: 3001
    targetPort: 3001
    protocol: TCP
  - name: grpc
    port: 50051
    targetPort: 50051
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: content-service
  namespace: playwright-learning
  labels:
    app: content-service
spec:
  type: ClusterIP
  selector:
    app: content-service
  ports:
  - name: http
    port: 3002
    targetPort: 3002
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: playwright-learning
  labels:
    app: analytics-service
spec:
  type: ClusterIP
  selector:
    app: analytics-service
  ports:
  - name: http
    port: 3003
    targetPort: 3003
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: playwright-learning
  labels:
    app: notification-service
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
  - name: http
    port: 3004
    targetPort: 3004
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: playwright-learning
  labels:
    app: redis-cluster
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: redis-cluster
  ports:
  - name: client
    port: 6379
    targetPort: 6379
  - name: gossip
    port: 16379
    targetPort: 16379
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: playwright-learning
  labels:
    app: mongodb
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: mongodb
  ports:
  - name: mongodb
    port: 27017
    targetPort: 27017
