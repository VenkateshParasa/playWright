apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: playwright-learning
data:
  # Redis Configuration
  redis_cluster_nodes: "redis-cluster-0.redis-cluster:6379,redis-cluster-1.redis-cluster:6379,redis-cluster-2.redis-cluster:6379,redis-cluster-3.redis-cluster:6379,redis-cluster-4.redis-cluster:6379,redis-cluster-5.redis-cluster:6379"

  # Kafka Configuration
  kafka_brokers: "kafka-0.kafka:9092,kafka-1.kafka:9092,kafka-2.kafka:9092"

  # Database Configuration
  clickhouse_host: "clickhouse.playwright-learning.svc.cluster.local:8123"

  # S3 Configuration
  s3_bucket: "playwright-learning-content"
  s3_region: "us-east-1"

  # CDN Configuration
  cdn_url: "https://cdn.playwright-learning.com"
  cloudfront_distribution: "E1234567890ABC"

  # Application Configuration
  app_url: "https://www.playwright-learning.com"
  api_url: "https://api.playwright-learning.com"

  # Cache Configuration
  cache_ttl_short: "60"
  cache_ttl_medium: "300"
  cache_ttl_long: "3600"

  # Rate Limiting
  rate_limit_window: "900000"
  rate_limit_max: "100"

  # Feature Flags
  enable_experimental_features: "false"
  enable_debug_mode: "false"

  # Monitoring
  jaeger_endpoint: "http://jaeger-collector:14268/api/traces"
  sentry_dsn: ""

  # CORS
  cors_origins: "https://www.playwright-learning.com,https://app.playwright-learning.com"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: playwright-learning
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 4096;
        use epoll;
        multi_accept on;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;
        client_max_body_size 50m;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml text/javascript
                   application/json application/javascript application/xml+rss
                   application/rss+xml font/truetype font/opentype
                   application/vnd.ms-fontobject image/svg+xml;

        # Brotli compression
        brotli on;
        brotli_comp_level 6;
        brotli_types text/plain text/css text/xml text/javascript
                     application/json application/javascript application/xml+rss;

        # Cache
        proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=app_cache:10m
                         max_size=1g inactive=60m use_temp_path=off;

        # Rate limiting
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=global_limit:10m rate=100r/s;
        limit_conn_zone $binary_remote_addr zone=addr:10m;

        # Upstream definitions
        upstream api_gateway {
            least_conn;
            server api-gateway:3000 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        upstream auth_service {
            least_conn;
            server auth-service:3001 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        upstream content_service {
            least_conn;
            server content-service:3002 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        server {
            listen 80;
            server_name _;

            # Security headers
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;

            # Health check endpoint
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }

            # API routes with rate limiting
            location /api/ {
                limit_req zone=api_limit burst=20 nodelay;
                limit_conn addr 10;

                proxy_pass http://api_gateway;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;

                # Timeouts
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }

            # Static assets with caching
            location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }
    }
