apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: playwright-learning
  labels:
    app: analytics-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
      - name: analytics-service
        image: playwright-learning/analytics-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3003
        - name: metrics
          containerPort: 9090
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3003"
        - name: SERVICE_NAME
          value: "analytics-service"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: mongodb_uri
        - name: REDIS_CLUSTER_NODES
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis_cluster_nodes
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: kafka_brokers
        - name: CLICKHOUSE_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: clickhouse_host
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3003
          initialDelaySeconds: 10
          periodSeconds: 5
