# Railway.app Configuration for Backend Service
# https://docs.railway.app/deploy/config-as-code

# Service Configuration
[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

# Runtime Configuration
[env]
NODE_ENV = "production"
PORT = "5000"

# Resource Limits
[resources]
# CPU: 8 vCPU, RAM: 8GB, Disk: 50GB
cpu = 8
memory = 8192
disk = 51200

# Autoscaling Configuration
[autoscaling]
enabled = true
minReplicas = 2
maxReplicas = 10
targetCPUPercent = 70
targetMemoryPercent = 80

# Health Check Configuration
[healthcheck]
path = "/health"
interval = 30
timeout = 10
startPeriod = 60
retries = 3

# Networking
[networking]
serviceDomain = "api.playwright-learning.com"

# Volumes (Persistent Storage)
[[volumes]]
name = "logs"
mountPath = "/var/log/app"
size = 10

[[volumes]]
name = "uploads"
mountPath = "/tmp/uploads"
size = 20

# Observability
[observability]
enabled = true
logsRetentionDays = 30

# Deploy Triggers
[triggers]
branch = "main"
autoRedeploy = true
