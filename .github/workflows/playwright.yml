name: Playwright Runner Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'playwright-runner/**'
      - '.github/workflows/playwright.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'playwright-runner/**'
      - '.github/workflows/playwright.yml'
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: playwright-runner/package-lock.json

      - name: Install dependencies
        working-directory: ./playwright-runner
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./playwright-runner
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        working-directory: ./playwright-runner
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-${{ matrix.os }}-${{ matrix.browser }}
          path: playwright-runner/test-results/
          retention-days: 30

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.os }}-${{ matrix.browser }}
          path: playwright-runner/playwright-report/
          retention-days: 30

  mobile:
    name: Mobile Browser Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        device: ['Pixel 5', 'iPhone 12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: playwright-runner/package-lock.json

      - name: Install dependencies
        working-directory: ./playwright-runner
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./playwright-runner
        run: npx playwright install --with-deps

      - name: Run mobile tests
        working-directory: ./playwright-runner
        run: npx playwright test --project="${{ matrix.device }}"

      - name: Upload mobile test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-mobile-${{ matrix.device }}
          path: playwright-runner/playwright-report/
          retention-days: 30

  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: playwright-runner/package-lock.json

      - name: Install dependencies
        working-directory: ./playwright-runner
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./playwright-runner
        run: npx playwright install --with-deps chromium

      - name: Run visual tests
        working-directory: ./playwright-runner
        run: npx playwright test --grep @visual

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-regression-diff
          path: playwright-runner/test-results/
          retention-days: 30
