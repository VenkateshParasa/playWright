name: Selenium Java Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'selenium-java/**'
      - '.github/workflows/selenium.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'selenium-java/**'
      - '.github/workflows/selenium.yml'
  schedule:
    # Run tests daily at 3 AM UTC
    - cron: '0 3 * * *'

jobs:
  test:
    name: Run Selenium Tests
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java-version: [11, 17, 21]
        browser: [chrome, firefox, edge]
        exclude:
          - os: macos-latest
            browser: edge
          - os: ubuntu-latest
            browser: edge

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}
          cache: 'maven'

      - name: Setup Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: latest

      - name: Setup Edge
        if: matrix.browser == 'edge' && matrix.os == 'windows-latest'
        uses: browser-actions/setup-edge@v1
        with:
          edge-version: stable

      - name: Install dependencies
        working-directory: ./selenium-java
        run: mvn clean install -DskipTests

      - name: Run tests
        working-directory: ./selenium-java
        run: mvn test -Dbrowser=${{ matrix.browser }}
        env:
          BROWSER: ${{ matrix.browser }}

      - name: Generate test report
        working-directory: ./selenium-java
        if: always()
        run: mvn surefire-report:report

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-results-${{ matrix.os }}-java${{ matrix.java-version }}-${{ matrix.browser }}
          path: |
            selenium-java/target/surefire-reports/
            selenium-java/target/site/surefire-report.html
          retention-days: 30

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: selenium-screenshots-${{ matrix.os }}-${{ matrix.browser }}
          path: selenium-java/screenshots/
          retention-days: 30

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Selenium Tests - ${{ matrix.os }} - Java ${{ matrix.java-version }} - ${{ matrix.browser }}
          path: selenium-java/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  headless:
    name: Headless Browser Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'maven'

      - name: Install dependencies
        working-directory: ./selenium-java
        run: mvn clean install -DskipTests

      - name: Run headless tests
        working-directory: ./selenium-java
        run: mvn test -Dheadless=true

      - name: Upload headless test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-headless-results
          path: selenium-java/target/surefire-reports/
          retention-days: 30
