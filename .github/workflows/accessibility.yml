name: Accessibility Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  accessibility-audit:
    name: Accessibility Audit
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Build application
        run: |
          cd frontend
          npm run build

      - name: Start application
        run: |
          cd frontend
          npm run preview &
          sleep 10
        env:
          CI: true

      - name: Run accessibility tests
        run: |
          cd tests
          npm ci
          npx playwright test accessibility/
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-test-results-${{ matrix.node-version }}
          path: tests/test-results/
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.node-version }}
          path: tests/playwright-report/
          retention-days: 30

  lighthouse-audit:
    name: Lighthouse Accessibility Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build application
        run: |
          cd frontend
          npm run build

      - name: Start application
        run: |
          cd frontend
          npm run preview &
          sleep 10
        env:
          CI: true

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://localhost:4173
            http://localhost:4173/dashboard
            http://localhost:4173/lessons
            http://localhost:4173/settings
          configPath: './.github/lighthouse/lighthouse-config.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Check Lighthouse scores
        run: |
          echo "Lighthouse accessibility audit completed"
          # Fail if accessibility score is below 90
          # This is handled by lighthouse-config.json assertions

  axe-core-audit:
    name: Axe-core Accessibility Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Install axe-core and dependencies
        run: |
          npm install -g @axe-core/cli pa11y-ci

      - name: Build application
        run: |
          cd frontend
          npm run build

      - name: Start application
        run: |
          cd frontend
          npm run preview &
          sleep 10
        env:
          CI: true

      - name: Run Pa11y CI
        run: |
          pa11y-ci --config .pa11yci.json
        continue-on-error: true

      - name: Generate accessibility report
        if: always()
        run: |
          echo "Accessibility audit completed"
          echo "Check artifacts for detailed reports"

  color-contrast-audit:
    name: Color Contrast Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build application
        run: |
          cd frontend
          npm run build

      - name: Start application
        run: |
          cd frontend
          npm run preview &
          sleep 10

      - name: Install Playwright
        run: |
          cd tests
          npm ci
          npx playwright install chromium

      - name: Run contrast checker
        run: |
          cd tests
          npx playwright test accessibility/accessibility.spec.ts -g "color contrast"

  wcag-compliance-report:
    name: Generate WCAG Compliance Report
    runs-on: ubuntu-latest
    needs: [accessibility-audit, lighthouse-audit, axe-core-audit]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate compliance report
        run: |
          echo "# WCAG 2.1 Level AA Compliance Report" > wcag-compliance-report.md
          echo "" >> wcag-compliance-report.md
          echo "Generated: $(date)" >> wcag-compliance-report.md
          echo "" >> wcag-compliance-report.md
          echo "## Test Results Summary" >> wcag-compliance-report.md
          echo "" >> wcag-compliance-report.md
          echo "All accessibility tests have been executed." >> wcag-compliance-report.md
          echo "Please review individual test artifacts for detailed results." >> wcag-compliance-report.md

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: wcag-compliance-report
          path: wcag-compliance-report.md

  notify-results:
    name: Notify Test Results
    runs-on: ubuntu-latest
    needs: [accessibility-audit, lighthouse-audit, axe-core-audit]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Accessibility testing workflow completed"
          echo "Review the artifacts and reports for detailed information"
