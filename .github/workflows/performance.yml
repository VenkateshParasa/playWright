name: Performance CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly performance tests
    - cron: '0 0 * * 0'

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build application
        working-directory: ./frontend
        run: pnpm run build

      - name: Run Lighthouse CI
        working-directory: ./frontend
        run: |
          npm install -g @lhci/cli
          lhci autorun --config=../lighthouse.config.js
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build and analyze bundle
        working-directory: ./frontend
        run: |
          pnpm run build
          npx vite-bundle-visualizer

      - name: Check bundle size
        working-directory: ./frontend
        run: |
          BUNDLE_SIZE=$(du -sh dist | cut -f1)
          echo "Bundle size: $BUNDLE_SIZE"

          # Fail if bundle exceeds 1MB
          SIZE_BYTES=$(du -sb dist | cut -f1)
          MAX_SIZE=$((1 * 1024 * 1024))

          if [ "$SIZE_BYTES" -gt "$MAX_SIZE" ]; then
            echo "❌ Bundle size exceeds 1MB limit"
            exit 1
          fi

          echo "✅ Bundle size within limits"

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: frontend/dist/stats.html
          retention-days: 30

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Start backend
        working-directory: ./backend
        run: |
          npm run build
          npm start &
          sleep 10
        env:
          NODE_ENV: production
          MONGODB_URI: mongodb://localhost:27017/test

      - name: Start frontend
        working-directory: ./frontend
        run: |
          npm run build
          npm run preview &
          sleep 5

      - name: Run performance tests
        working-directory: ./frontend
        run: |
          npm install -g autocannon

          # Test API endpoints
          echo "Testing API performance..."
          autocannon -c 100 -d 30 http://localhost:3001/api/health

          # Test frontend
          echo "Testing frontend performance..."
          autocannon -c 50 -d 30 http://localhost:4173

      - name: Memory leak test
        working-directory: ./frontend
        run: |
          npm install -g clinic
          clinic doctor --on-port 'autocannon -c 10 -d 30 localhost:$PORT' -- node dist/server.js

  image-optimization:
    name: Image Optimization Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ImageMagick and WebP
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick webp

      - name: Check image optimization
        run: |
          cd frontend/public

          # Check for unoptimized images
          LARGE_IMAGES=$(find . -type f \( -iname "*.jpg" -o -iname "*.png" \) -size +500k)

          if [ -n "$LARGE_IMAGES" ]; then
            echo "❌ Found unoptimized images larger than 500KB:"
            echo "$LARGE_IMAGES"
            exit 1
          fi

          echo "✅ All images are optimized"

      - name: Generate WebP versions
        run: |
          bash scripts/optimize-images.sh frontend/public frontend/public/optimized 85

  core-web-vitals:
    name: Core Web Vitals Monitoring
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build application
        working-directory: ./frontend
        run: npm run build

      - name: Measure Core Web Vitals
        run: |
          npm install -g web-vitals-cli

          # Start server
          cd frontend
          npm run preview &
          sleep 5

          # Measure vitals
          web-vitals http://localhost:4173 --output json > vitals.json

          # Check thresholds
          node -e "
          const vitals = require('./vitals.json');

          const thresholds = {
            FCP: 1800,
            LCP: 2500,
            CLS: 0.1,
            FID: 100,
            TTFB: 800
          };

          let failed = false;

          Object.entries(thresholds).forEach(([metric, threshold]) => {
            const value = vitals[metric];
            if (value > threshold) {
              console.error(\`❌ \${metric}: \${value} exceeds threshold \${threshold}\`);
              failed = true;
            } else {
              console.log(\`✅ \${metric}: \${value} within threshold\`);
            }
          });

          if (failed) process.exit(1);
          "

      - name: Upload Web Vitals report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-vitals
          path: vitals.json
          retention-days: 30

  dependency-analysis:
    name: Dependency Size Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Analyze dependencies
        working-directory: ./frontend
        run: |
          npm install -g cost-of-modules
          npm ci

          echo "Analyzing dependency sizes..."
          cost-of-modules --json > dependency-costs.json

          # Check for large dependencies
          node -e "
          const costs = require('./dependency-costs.json');
          const largeDeps = costs.filter(d => d.size > 500000);

          if (largeDeps.length > 0) {
            console.log('⚠️  Large dependencies found:');
            largeDeps.forEach(d => {
              console.log(\`  - \${d.name}: \${(d.size / 1024).toFixed(0)}KB\`);
            });
          }
          "

      - name: Upload dependency analysis
        uses: actions/upload-artifact@v4
        with:
          name: dependency-costs
          path: frontend/dependency-costs.json
          retention-days: 30

  performance-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: [lighthouse, bundle-analysis, core-web-vitals]
    if: always()

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Generate summary
        run: |
          echo "# Performance Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Lighthouse Scores" >> $GITHUB_STEP_SUMMARY
          echo "✅ Lighthouse audit completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "✅ Bundle analysis completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Core Web Vitals" >> $GITHUB_STEP_SUMMARY
          echo "✅ Web Vitals measured" >> $GITHUB_STEP_SUMMARY
