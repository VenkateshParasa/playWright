name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  dependency-scanning:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies - Backend
        working-directory: ./backend
        run: npm ci

      - name: Install dependencies - Frontend
        working-directory: ./frontend
        run: npm ci

      - name: Run npm audit - Backend
        working-directory: ./backend
        run: npm audit --audit-level=moderate || true

      - name: Run npm audit - Frontend
        working-directory: ./frontend
        run: npm audit --audit-level=moderate || true

      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: |
            backend/npm-audit.json
            frontend/npm-audit.json

  snyk-security-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk Auth
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
        if: env.SNYK_TOKEN != ''
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Test - Backend
        working-directory: ./backend
        run: snyk test --severity-threshold=high || true
        if: env.SNYK_TOKEN != ''
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Test - Frontend
        working-directory: ./frontend
        run: snyk test --severity-threshold=high || true
        if: env.SNYK_TOKEN != ''
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Monitor - Backend
        working-directory: ./backend
        run: snyk monitor || true
        if: github.ref == 'refs/heads/main' && env.SNYK_TOKEN != ''
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Monitor - Frontend
        working-directory: ./frontend
        run: snyk monitor || true
        if: github.ref == 'refs/heads/main' && env.SNYK_TOKEN != ''
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  code-quality-scan:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies - Backend
        working-directory: ./backend
        run: npm ci

      - name: Install dependencies - Frontend
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint - Backend
        working-directory: ./backend
        run: npm run lint || true

      - name: Run ESLint - Frontend
        working-directory: ./frontend
        run: npm run lint || true

      - name: Run TypeScript Type Check - Backend
        working-directory: ./backend
        run: npm run type-check || true

      - name: Run TypeScript Type Check - Frontend
        working-directory: ./frontend
        run: npm run type-check || true

  sast-scan:
    name: Static Application Security Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript,typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  container-security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          if [ -f docker-compose.yml ]; then
            docker-compose build || echo "No docker-compose.yml found"
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  security-headers-check:
    name: Security Headers Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check security headers configuration
        run: |
          echo "Checking for security headers configuration..."

          # Check for helmet usage in backend
          if grep -r "helmet" backend/src/; then
            echo "✓ Helmet security headers found in backend"
          else
            echo "⚠ Warning: Helmet security headers not found in backend"
          fi

          # Check for CSP configuration
          if grep -r "contentSecurityPolicy\|Content-Security-Policy" backend/src/ frontend/src/; then
            echo "✓ Content Security Policy configuration found"
          else
            echo "⚠ Warning: Content Security Policy not configured"
          fi

  environment-security-check:
    name: Environment Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for exposed secrets in code
        run: |
          echo "Checking for exposed secrets..."

          # Check for hardcoded secrets
          if grep -r "password.*=.*['\"].*['\"]" --include="*.ts" --include="*.js" --exclude-dir=node_modules .; then
            echo "⚠ Warning: Possible hardcoded passwords found"
            exit 1
          fi

          # Check for API keys
          if grep -r "api[_-]key.*=.*['\"].*['\"]" --include="*.ts" --include="*.js" --exclude-dir=node_modules .; then
            echo "⚠ Warning: Possible hardcoded API keys found"
            exit 1
          fi

          echo "✓ No obvious hardcoded secrets found"

      - name: Check for .env files in repository
        run: |
          if find . -name ".env" -not -path "*/node_modules/*"; then
            echo "⚠ Warning: .env files found in repository"
            exit 1
          else
            echo "✓ No .env files found in repository"
          fi

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scanning, code-quality-scan, secret-scanning]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true

      - name: Generate security report
        run: |
          echo "# Security Scan Report" > security-report.md
          echo "" >> security-report.md
          echo "Date: $(date)" >> security-report.md
          echo "Branch: ${{ github.ref }}" >> security-report.md
          echo "Commit: ${{ github.sha }}" >> security-report.md
          echo "" >> security-report.md
          echo "## Scan Results" >> security-report.md
          echo "" >> security-report.md
          echo "- Dependency Scanning: ${{ needs.dependency-scanning.result }}" >> security-report.md
          echo "- Code Quality: ${{ needs.code-quality-scan.result }}" >> security-report.md
          echo "- Secret Scanning: ${{ needs.secret-scanning.result }}" >> security-report.md
          echo "" >> security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md

      - name: Comment PR with security results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
